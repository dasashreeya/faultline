name: faultline-gate
description: Run Faultline and fail the workflow if the latest Resilience Score is below the gate.

inputs:
  path:
    description: Directory containing faultline.yaml
    default: "."
  min-score:
    description: Minimum Resilience Score
    default: "85"
  python-version:
    description: Python version for the runner
    default: "3.11"
  run-break:
    description: Run `faultline break` before checking the gate
    default: "true"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v8

    - name: Install project
      shell: bash
      run: uv sync --project "${GITHUB_ACTION_PATH}/.."

    - name: Run Faultline gauntlet
      if: ${{ inputs.run-break == 'true' }}
      shell: bash
      run: uv run --project "${GITHUB_ACTION_PATH}/.." faultline break --path "${{ inputs.path }}"

    - name: Render Faultline report
      if: ${{ inputs.run-break == 'true' }}
      shell: bash
      run: uv run --project "${GITHUB_ACTION_PATH}/.." faultline report --path "${{ inputs.path }}"

    - name: Enforce Resilience Score gate
      shell: bash
      run: uv run --project "${GITHUB_ACTION_PATH}/.." faultline gate --path "${{ inputs.path }}" --min-score "${{ inputs.min-score }}"
