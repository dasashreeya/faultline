# Faultline config for the support-bot example.
# Sandbox default: scripted naive agent + detectors-only judge — the whole
# loop runs offline for pennies (well, for free). Flip to the commented
# values for the real thing.
target:
  agent: examples.support_bot.naive_agent:run_task
  # agent: examples.support_bot.agent:run_task     # OpenAI Agents SDK (needs OPENAI_API_KEY)
  tools: examples.support_bot.tools:build_tools
  reset: examples.support_bot.tools:reset_backend
  snapshot: examples.support_bot.tools:snapshot
  scenarios: scenarios.yaml
  model: gpt-5.2-mini

judge:
  mode: detectors # llm (needs OPENAI_API_KEY)
  model: gpt-5.6

seeds: [1, 3] # seed 1 draws tool_timeout, seed 3 draws tool_flapping — both F2 traps on camera
run_timeout_s: 30

gate:
  min_score: 85

harden:
  max_attempts: 3
