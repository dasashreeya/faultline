name: faultline-gate-smoke

# Dogfoods action/action.yml against the bundled support-bot example. This is
# a smoke test, not a merge gate: the public support-bot demo target is
# intentionally fragile (baseline Resilience Score 20.6/100 -- see
# FAULTLINE_BLUEPRINT.md section 6), so the threshold below only proves the
# action runs the gauntlet and enforces a floor, not that the example agent is
# production-ready.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "action/**"
      - "src/faultline/**"
      - "examples/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/faultline-gate.yml"
  pull_request:
    paths:
      - "action/**"
      - "src/faultline/**"
      - "examples/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/faultline-gate.yml"

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./action
        with:
          path: examples/support_bot
          min-score: "20"
