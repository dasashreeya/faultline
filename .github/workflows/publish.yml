name: publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build, verify, and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Check out release
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install locked project
        run: uv sync --locked

      - name: Run offline regression suite
        run: uv run pytest -q

      - name: Build publishable distributions
        run: uv build --no-sources

      - name: Smoke-test the wheel
        shell: bash
        run: |
          wheel=(dist/*.whl)
          uv run --no-project --with "${wheel[0]}" python -c "import faultline"
          uv run --no-project --with "${wheel[0]}" faultline --help >/dev/null

      - name: Publish with PyPI trusted publishing
        run: uv publish --trusted-publishing always
